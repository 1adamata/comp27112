<svg viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <defs>
    <linearGradient id="ntBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2230"/>
      <stop offset="100%" stop-color="#0e1016"/>
    </linearGradient>
    <marker id="ntW" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#fff"/></marker>
  </defs>
  <rect width="640" height="420" fill="url(#ntBg)"/>

  <!-- slanted surface -->
  <polygon points="60,400 320,140 360,160 110,420" fill="#26344f"/>
  <line x1="60" y1="400" x2="340" y2="150" stroke="#7fa3d6" stroke-width="3" opacity="0.7"/>

  <!-- contact point -->
  <rect x="222" y="232" width="20" height="20" fill="none" stroke="#ff8a3d" stroke-width="4" transform="rotate(-43 232 242)"/>

  <!-- Tangent -->
  <line x1="232" y1="242" x2="150" y2="160" stroke="#fff" stroke-width="4" marker-end="url(#ntW)"/>
  <text x="120" y="150" fill="#fff" font-size="24" font-weight="700">T&#770;</text>
  <!-- Normal -->
  <line x1="232" y1="242" x2="340" y2="190" stroke="#fff" stroke-width="4" marker-end="url(#ntW)"/>
  <text x="350" y="190" fill="#fff" font-size="24" font-weight="700">N&#770;</text>

  <text x="360" y="70" fill="#e7e7ea" font-size="24">N&#770; &#183; T&#770; = 0</text>
  <text x="360" y="108" fill="#9ddb8f" font-size="19">n&#8339;t&#8339; + n&#7517;t&#7517; + n&#8334;t&#8334; = 0</text>
</svg>
