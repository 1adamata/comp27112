<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <defs>
    <radialGradient id="rmFloor" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#3a4a63"/>
      <stop offset="100%" stop-color="#10141d"/>
    </radialGradient>
    <linearGradient id="rmWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c2c30"/>
      <stop offset="100%" stop-color="#1d1d20"/>
    </linearGradient>
    <radialGradient id="rmSpot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8ea2c8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8ea2c8" stop-opacity="0"/>
    </radialGradient>
    <marker id="rmArrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#ffffff"/>
    </marker>
    <marker id="rmArrowO" markerWidth="11" markerHeight="11" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#ff8a3d"/>
    </marker>
  </defs>

  <rect width="720" height="420" fill="url(#rmWall)"/>
  <rect y="250" width="720" height="170" fill="url(#rmFloor)"/>
  <ellipse cx="360" cy="262" rx="230" ry="44" fill="url(#rmSpot)"/>

  <!-- micro surface patch -->
  <rect x="300" y="256" width="120" height="7" rx="2" fill="#f4a9c0"/>

  <!-- light bulb -->
  <g transform="translate(150,120)">
    <circle r="20" fill="#fff4d6"/>
    <circle r="20" fill="#fff4d6" opacity="0.4" transform="scale(1.6)"/>
    <rect x="-7" y="16" width="14" height="10" rx="2" fill="#bfbfbf"/>
  </g>
  <!-- camera -->
  <g transform="translate(600,210)">
    <rect x="-34" y="-22" width="68" height="44" rx="6" fill="#111"/>
    <circle cx="0" cy="0" r="15" fill="#222" stroke="#444" stroke-width="3"/>
    <circle cx="0" cy="0" r="7" fill="#0a0a0a"/>
    <rect x="14" y="-18" width="12" height="7" rx="2" fill="#333"/>
  </g>

  <!-- origin -->
  <circle cx="360" cy="259" r="4" fill="#fff"/>

  <!-- N (up) -->
  <line x1="360" y1="259" x2="360" y2="95" stroke="#fff" stroke-width="3" marker-end="url(#rmArrow)"/>
  <text x="372" y="92" fill="#fff" font-size="26" font-weight="700">N&#770;</text>

  <!-- L (to light) -->
  <line x1="360" y1="259" x2="205" y2="150" stroke="#fff" stroke-width="3" marker-end="url(#rmArrow)"/>
  <text x="245" y="190" fill="#fff" font-size="24" font-weight="700">L&#770;</text>

  <!-- V (to camera) -->
  <line x1="360" y1="259" x2="560" y2="218" stroke="#fff" stroke-width="3" marker-end="url(#rmArrow)"/>
  <text x="520" y="252" fill="#fff" font-size="24" font-weight="700">V&#770;</text>

  <!-- H (half vector) -->
  <line x1="360" y1="259" x2="438" y2="120" stroke="#ff8a3d" stroke-width="4" marker-end="url(#rmArrowO)"/>
  <text x="448" y="120" fill="#ff8a3d" font-size="24" font-weight="700">H&#770;</text>

  <!-- omega angle -->
  <path d="M360 150 A 110 110 0 0 1 405 168" fill="none" stroke="#cfd6e6" stroke-width="2"/>
  <text x="378" y="150" fill="#cfd6e6" font-size="20" font-style="italic">&#969;</text>

  <text x="200" y="135" fill="#ffe27a" font-size="26" font-style="italic" font-weight="700">I</text>

  <!-- formula -->
  <text x="360" y="392" text-anchor="middle" fill="#9ddb8f" font-size="24">
    C = I( k&#7496;(N&#770;&#183;L&#770;) + k&#8347;(H&#770;&#183;N&#770;)&#8319; )
  </text>
</svg>
