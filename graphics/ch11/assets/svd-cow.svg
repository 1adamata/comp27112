<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <!-- result: skewed square -->
  <g transform="translate(40,60)">
    <polygon points="0,80 90,40 150,40 60,80" fill="#5fb6e6" opacity="0.9"/>
    <text x="55" y="150" fill="#cdd3df" font-size="20">skew</text>
  </g>
  <text x="225" y="150" fill="#fff" font-size="34">=</text>

  <!-- R1 rotation -->
  <g transform="translate(270,60)">
    <rect x="0" y="20" width="90" height="60" rx="3" fill="#e7c46b" opacity="0.9" transform="rotate(-14 45 50)"/>
    <text x="20" y="140" fill="#e7a85b" font-size="22" font-style="italic">R&#8321;</text>
    <text x="-2" y="170" fill="#cdd3df" font-size="13">[cos&#952; &#8722;sin&#952;]</text>
    <text x="-2" y="188" fill="#cdd3df" font-size="13">[sin&#952;&#160;&#160;cos&#952;]</text>
  </g>

  <!-- S scale -->
  <g transform="translate(420,60)">
    <rect x="0" y="30" width="100" height="40" rx="3" fill="#e7c46b" opacity="0.9"/>
    <text x="35" y="140" fill="#e7a85b" font-size="22" font-style="italic">S</text>
    <text x="18" y="170" fill="#cdd3df" font-size="13">[s&#8339;&#160;&#160;0]</text>
    <text x="18" y="188" fill="#cdd3df" font-size="13">[0&#160;&#160;s&#7517;]</text>
  </g>

  <!-- R2 rotation -->
  <g transform="translate(580,60)">
    <rect x="0" y="20" width="90" height="60" rx="3" fill="#e7c46b" opacity="0.9" transform="rotate(12 45 50)"/>
    <text x="20" y="140" fill="#e7a85b" font-size="22" font-style="italic">R&#8322;</text>
    <text x="-6" y="170" fill="#cdd3df" font-size="13">[&#160;cos&#952;&#160;sin&#952;]</text>
    <text x="-6" y="188" fill="#cdd3df" font-size="13">[&#8722;sin&#952;&#160;cos&#952;]</text>
  </g>
</svg>
